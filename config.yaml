# ══════════════════════════════════════════════════════════════════
# Breast Cancer Histopathology — Complete Experiment Configuration
# ══════════════════════════════════════════════════════════════════
# Updated: 2026-03-19
# Includes: All transformer variants, quantum circuits, fusion models
# ══════════════════════════════════════════════════════════════════

# ── Dataset ──────────────────────────────────────────────────────
data:
  # Primary dataset
  dataset: "breakhis"  # Options: breakhis, wbcd, seer, cbis_ddsm
  data_dir: "data/BreaKHis_v1"  # Path to dataset
  task: "binary"  # "binary" or "multi" (multi-class for BreakHis)
  subset: null  # Set to integer (e.g., 200) for quick tests, null for full
  num_workers: 8  # DataLoader workers (increase for A100)
  seed: 42  # Random seed
  
  # CBIS-DDSM specific (for generalization validation)
  cbis_ddsm:
    data_dir: "data/CBIS-DDSM"
    auto_download: true  # Auto-download from Kaggle if not found
    kaggle_username: null  # Set or use KAGGLE_USERNAME env var
    kaggle_key: null  # Set or use KAGGLE_KEY env var

# ── Cross-Validation ────────────────────────────────────────────
cv:
  n_folds: 5  # 5-fold cross-validation for research-grade results

# ── Training (shared defaults) ────────────────────────────────────────────────
training:
  epochs: 50  # Full training epochs for research-grade results
  patience: 15  # ⭐ Increased from 10 — gives cosine LR more room before stopping
  grad_clip: 1.0  # Gradient clipping max norm (0 = disabled)

# ── Models to Run ───────────────────────────────────────────────
# Set "enabled: true/false" to include/exclude models

models:
  # ════════════════════════════════════════════════════════════
  # BASELINE MODELS
  # ════════════════════════════════════════════════════════════
  
  # 1. EfficientNet-B3 Baseline
  efficientnet:
    enabled: true
    batch_size: 32
    lr: 1.0e-4
    weight_decay: 1.0e-4
    use_amp: true  # Mixed precision (A100 optimized)

  # 2. Spiking CNN (LIF-SNN) - REMOVED per project decision
  #    Clinically unusable due to 62.8% false negative rate
  spiking:
    enabled: false  # permanently disabled - SNN removed from project
    batch_size: 16
    lr: 8.0e-4
    weight_decay: 1.0e-4
    use_amp: false
    num_steps: 10
    beta: 0.9
    threshold: 1.0
    dropout: 0.5

  # 3. Hybrid CNN+ViT
  hybrid_vit:
    enabled: true
    batch_size: 32
    lr: 1.0e-4
    weight_decay: 1.0e-4
    use_amp: true
    d_model: 256
    num_heads: 4
    num_layers: 2
    dropout: 0.1
    warmup_epochs: 5
    freeze_backbone: false

  # 4. Pure ViT-Tiny
  vit_tiny:
    enabled: true
    batch_size: 32
    lr: 1.0e-4
    weight_decay: 1.0e-4
    use_amp: true
    dropout: 0.1
    warmup_epochs: 5

  # ════════════════════════════════════════════════════════════
  # TRANSFORMER MODELS (New - Phase 1-2)
  # ════════════════════════════════════════════════════════════
  
  # 5. Swin Transformer Tiny
  swin_tiny:
    enabled: true
    batch_size: 32
    lr: 2.0e-5
    weight_decay: 1.0e-4
    use_amp: true
    img_size: 224
    pretrained: true
    dropout: 0.3

  # 6. Swin Transformer Small
  swin_small:
    enabled: true
    batch_size: 32
    lr: 2.0e-5
    weight_decay: 1.0e-4
    use_amp: true
    img_size: 224
    pretrained: true
    dropout: 0.3

  # 7. Swin Transformer V2 Small
  swin_v2_small:
    enabled: true
    batch_size: 16  # Smaller due to 256×256 input
    lr: 2.0e-5
    weight_decay: 1.0e-4
    use_amp: true
    img_size: 256
    pretrained: true
    dropout: 0.3

  # 8. ConvNeXt Tiny
  convnext_tiny:
    enabled: true
    batch_size: 32
    lr: 2.0e-5
    weight_decay: 1.0e-4
    use_amp: true
    pretrained: true
    dropout: 0.3
    drop_path_rate: 0.1

  # 9. ConvNeXt Small
  convnext_small:
    enabled: true
    batch_size: 32
    lr: 2.0e-5
    weight_decay: 1.0e-4
    use_amp: true
    pretrained: true
    dropout: 0.3
    drop_path_rate: 0.1

  # 10. DeiT Tiny (with distillation)
  deit_tiny:
    enabled: true
    batch_size: 32
    lr: 2.0e-5
    weight_decay: 1.0e-4
    use_amp: true
    pretrained: true
    dropout: 0.1
    use_distillation: true

  # 11. DeiT Small
  deit_small:
    enabled: true
    batch_size: 32
    lr: 2.0e-5
    weight_decay: 1.0e-4
    use_amp: true
    pretrained: true
    dropout: 0.1
    use_distillation: true

  # 12. DeiT Base
  deit_base:
    enabled: false  # Large model, enable if VRAM permits
    batch_size: 16
    lr: 2.0e-5
    weight_decay: 1.0e-4
    use_amp: true
    pretrained: true
    dropout: 0.1
    use_distillation: true

  # ════════════════════════════════════════════════════════════
  # FUSION MODELS (New - Phase 2)
  # ════════════════════════════════════════════════════════════
  
  # 13. Dual-Branch Dynamic Fusion (Swin + ConvNeXt)
  dual_branch_fusion:
    enabled: true
    batch_size: 16  # Smaller due to two backbones
    lr: 2.0e-5
    weight_decay: 1.0e-4
    use_amp: true
    swin_variant: "tiny"  # Options: tiny, small, v2_small
    convnext_variant: "tiny"  # Options: tiny, small, base
    dropout: 0.3
    entropy_weight: 0.01  # Entropy regularization weight
    gate_temperature: 1.0

  # 14. Triple-Branch Cross-Attention Fusion (TBCA-Fusion)
  # Reference: PROPOSED_ARCHITECTURES.md - Architecture 1
  triple_branch_fusion:
    enabled: true  # ENABLED for training with B5
    batch_size: 10  # Reduced for B5 (uses more memory)
    lr: 5.0e-5  # ⭐ Raised from 1e-5 (was decaying to near-zero by ep 15)
    weight_decay: 1.0e-4
    use_amp: true
    swin_variant: "small"
    convnext_variant: "small"
    efficientnet_variant: "b5"  # ⭐ B5 (2048-dim) for all TBCA models
    dropout: 0.3
    fusion_dim: 768
    num_heads: 8
    entropy_weight: 0.01
    warmup_epochs: 3  # ⭐ Stabilises multi-branch gradient flow at start

  # 14b. TBCA-Fusion with Quantum Fusion (Placement 3) ⭐
  triple_branch_fusion_quantum:
    enabled: true
    batch_size: 10
    lr: 5.0e-5  # ⭐ Raised from 1e-5
    weight_decay: 1.0e-4
    use_amp: true
    swin_variant: "small"
    convnext_variant: "small"
    efficientnet_variant: "b5"  # ⭐ B5 everywhere
    dropout: 0.3
    fusion_dim: 768
    num_heads: 8
    entropy_weight: 0.01
    use_quantum_fusion: true
    use_quantum_bottleneck: false
    quantum_n_qubits: 8
    quantum_n_layers: 2
    warmup_epochs: 3  # ⭐ Warmup for stability

  # 14c. TBCA-Fusion with Quantum Bottleneck (Placement 2)
  triple_branch_fusion_bottleneck:
    enabled: true
    batch_size: 10
    lr: 5.0e-5  # ⭐ Raised from 1e-5
    weight_decay: 1.0e-4
    use_amp: true
    swin_variant: "small"
    convnext_variant: "small"
    efficientnet_variant: "b5"  # ⭐ B5 everywhere
    dropout: 0.3
    fusion_dim: 768
    num_heads: 8
    entropy_weight: 0.01
    use_quantum_fusion: false
    use_quantum_bottleneck: true
    quantum_n_qubits: 8
    quantum_n_layers: 2
    warmup_epochs: 3  # ⭐ Warmup for stability

  # TBCA CNN FeatureMap Quantum
  triple_branch_fusion_cnn_featuremap_quantum:
    enabled: true
    batch_size: 10
    lr: 5.0e-5  # ⭐ Raised from 1e-5
    weight_decay: 1.0e-4
    use_amp: true
    swin_variant: "small"
    convnext_variant: "small"
    efficientnet_variant: "b5"  # ⭐ B5 everywhere
    dropout: 0.3
    fusion_dim: 768
    num_heads: 8
    entropy_weight: 0.01
    quantum_n_qubits: 8
    quantum_n_layers: 2
    quantum_rotation_config: "u3"
    quantum_entanglement: "cyclic"
    quantum_feature_map_mode: "cnn"
    warmup_epochs: 3

  # TBCA ViT FeatureMap Quantum
  triple_branch_fusion_vit_featuremap_quantum:
    enabled: true
    batch_size: 10
    lr: 5.0e-5  # ⭐ Raised from 1e-5
    weight_decay: 1.0e-4
    use_amp: true
    swin_variant: "small"
    convnext_variant: "small"
    efficientnet_variant: "b5"  # ⭐ B5 everywhere
    dropout: 0.3
    fusion_dim: 768
    num_heads: 8
    entropy_weight: 0.01
    quantum_n_qubits: 8
    quantum_n_layers: 2
    quantum_rotation_config: "u3"
    quantum_entanglement: "cyclic"
    quantum_feature_map_mode: "vit"
    vit_d_model: 256
    vit_num_heads: 4
    vit_num_layers: 2
    warmup_epochs: 3

  # 15. Class-Balanced Quantum-Classical Fusion (CB-QCCF)
  # Reference: PROPOSED_ARCHITECTURES.md - Architecture 3, QUANTUM_ARCHITECTURES.md
  cb_qccf:
    enabled: true  # ENABLED for training
    batch_size: 16
    lr: 2.0e-5
    weight_decay: 1.0e-4
    use_amp: false  # Quantum may not support AMP
    backbone: "swin_small"  # Options: swin_tiny, swin_small, swin_v2_small
    quantum_backbone: "resnet18"  # Options: resnet18, resnet34
    n_qubits: 8
    n_layers: 2
    rotation_config: "ry_only"  # Options: ry_only, ry_rz, u3, rx_ry_rz
    entanglement: "cyclic"  # Options: cyclic, full, tree, none
    dropout: 0.3
    specificity_weight: 2.0  # Heavily penalize false positives

  # 15b. CB-QCCF Variant 1: ConvNeXt + EfficientNet-B5 + Quantum
  cb_qccf_convnet_efficient:
    enabled: true  # ⭐ ENABLED for testing
    batch_size: 14  # Slightly smaller (ConvNeXt + B5)
    lr: 2.0e-5
    weight_decay: 1.0e-4
    use_amp: false
    classical_backbone: "convnext_small"
    quantum_backbone: "efficientnet_b5"
    n_qubits: 8
    n_layers: 2
    rotation_config: "ry_only"
    entanglement: "cyclic"
    dropout: 0.3
    specificity_weight: 2.0

  # 15c. CB-QCCF Variant 2: Swin + ConvNeXt + Quantum
  cb_qccf_swin_convnet:
    enabled: true  # ⭐ ENABLED for testing
    batch_size: 16
    lr: 2.0e-5
    weight_decay: 1.0e-4
    use_amp: false
    classical_backbone: "swin_small"
    quantum_backbone: "convnext_small"
    n_qubits: 8
    n_layers: 2
    rotation_config: "ry_only"
    entanglement: "cyclic"
    dropout: 0.3
    specificity_weight: 2.0

  # 16. Multi-Scale Quantum Fusion (MSQF)
  # Reference: QUANTUM_ARCHITECTURES.md - Architecture 2
  multi_scale_quantum_fusion:
    enabled: true  # ENABLED for training
    batch_size: 16
    lr: 2.0e-5
    weight_decay: 1.0e-4
    use_amp: false
    backbone: "resnet34"  # Options: resnet18, resnet34, resnet50
    n_qubits: 8
    n_layers: 2
    dropout: 0.3
    # Scale configurations: [(rotation, entanglement), ...] for 3 scales
    # Default: progressive complexity across scales
    scale_configs:
      - ["ry_only", "cyclic"]   # Scale 1: Fine cellular details
      - ["ry_rz", "cyclic"]     # Scale 2: Medium tissue structures
      - ["u3", "full"]          # Scale 3: Global architecture

  # 17. Teacher-Student Distillation with Ensemble (TSD-Ensemble)
  # Reference: PROPOSED_ARCHITECTURES.md - Architecture 5
  ensemble_distillation:
    enabled: true  # ENABLED for training
    batch_size: 16
    lr: 1.0e-4  # Higher LR since teachers are frozen
    weight_decay: 1.0e-4
    use_amp: true
    student_model: "triple_branch_fusion"  # Options: triple_branch_fusion, cb_qccf, multi_scale_quantum_fusion
    teacher_models:  # Best performing models as teachers
      - "swin_small"
      - "hybrid_vit"
      - "efficientnet"
    temperature: 4.0  # Temperature for soft targets
    distillation_alpha: 0.7  # Weight for hard label loss

  # ════════════════════════════════════════════════════════════
  # QUANTUM MODELS (New - Phase 3)
  # ════════════════════════════════════════════════════════════

  # 18. QENN (Quantum-Enhanced Neural Network) - RY-only
  qenn_ry:
    enabled: true
    batch_size: 16
    lr: 2.0e-5
    weight_decay: 1.0e-4
    use_amp: false  # Quantum may not support AMP
    n_qubits: 8
    n_layers: 2
    rotation_config: "ry_only"  # RY-only rotation
    entanglement: "cyclic"  # CNOT ring
    dropout: 0.3

  # 19. QENN (Quantum-Enhanced Neural Network) - RY+RZ rotation
  qenn_ry_rz:
    enabled: true
    batch_size: 16
    lr: 2.0e-5
    weight_decay: 1.0e-4
    use_amp: false
    n_qubits: 8
    n_layers: 2
    rotation_config: "ry_rz"  # RY + RZ rotations
    entanglement: "cyclic"
    dropout: 0.3

  # 20. QENN - U3 rotation (full single-qubit)
  qenn_u3:
    enabled: true
    batch_size: 16
    lr: 2.0e-5
    weight_decay: 1.0e-4
    use_amp: false
    n_qubits: 8
    n_layers: 2
    rotation_config: "u3"  # U3(θ, φ, λ) full rotation
    entanglement: "cyclic"
    dropout: 0.3

  # 21. QENN - RX+RY+RZ rotation (maximum expressivity)
  qenn_rx_ry_rz:
    enabled: true
    batch_size: 16
    lr: 2.0e-5
    weight_decay: 1.0e-4
    use_amp: false
    n_qubits: 8
    n_layers: 2
    rotation_config: "rx_ry_rz"  # All three rotations
    entanglement: "cyclic"
    dropout: 0.3

  # 22. Quantum-Enhanced Fusion (Swin+ConvNeXt+Quantum)
  quantum_enhanced_fusion:
    enabled: true
    batch_size: 16
    lr: 2.0e-5
    weight_decay: 1.0e-4
    use_amp: false
    swin_variant: "tiny"
    convnext_variant: "tiny"
    n_qubits: 8
    n_layers: 2
    rotation_config: "ry_only"  # Will be ablated
    entanglement: "cyclic"  # Will be ablated
    dropout: 0.3
    entropy_weight: 0.01

  # 23. CNN+PQC (PennyLane fallback - legacy)
  quantum:
    enabled: false  # Disabled - use vectorized quantum instead
    batch_size: 8
    lr: 1.0e-4
    weight_decay: 1.0e-4
    use_amp: false
    n_qubits: 8
    n_layers: 2
    dropout: 0.3
    freeze_backbone: false
    use_pennylane: true

# ── Quantum Ablation Study Configurations ─────────────────────
# These configs are for systematic quantum architecture search

quantum_ablation:
  # Rotation gate ablation
  rotation_configs:
    - "ry_only"
    - "ry_rz"
    - "u3"
    - "rx_ry_rz"
  
  # Entanglement strategy ablation
  entanglement_configs:
    - "cyclic"
    - "full"
    - "tree"
  
  # Qubit count ablation
  qubit_configs:
    - 4
    - 8
    - 12
  
  # Layer depth ablation
  layer_configs:
    - 1
    - 2
    - 3

# ── Output ──────────────────────────────────────────────────────
output:
  output_dir: "outputs"
  save_best_model: true
  save_plots: true  # Training curves, ROC, confusion matrix
  save_csv: true  # Per-fold and summary CSVs
  save_checkpoints: true  # Save best model per fold
  wandb_enabled: true  # Enable Weights & Biases tracking
  wandb_project: "breast-cancer-histopathology-final-2026"

# ── A100 GPU Optimizations ─────────────────────────────────────
gpu:
  use_flash_attention: true  # Enable Flash Attention 2 if available
  use_tf32: true  # Use TF32 tensor cores on A100
  benchmark_mode: true  # cudnn.benchmark = True
  deterministic: false  # Set to true for reproducibility (slower)
